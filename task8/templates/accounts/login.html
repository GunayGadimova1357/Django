{% extends "main/base.html" %}

{% block title %}Login - StdStack{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <h1 class="text-3xl font-extrabold mb-6">Login</h1>
    <form method="post" class="bg-white border border-zinc-200 rounded-lg p-6 space-y-5 shadow-sm">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
        <div>
            <label class="block text-sm font-bold text-zinc-900 mb-2" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<p class="mt-1 text-sm font-semibold text-zinc-900">{{ error }}</p>{% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-zinc-950 text-white px-5 py-3 rounded-md font-bold hover:bg-zinc-700">Login</button>
    </form>
</div>
{% endblock %}
