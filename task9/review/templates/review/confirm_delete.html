{% extends 'review/base.html' %}

{% block content %}
<div class="card shadow-sm text-center">
    <div class="card-body">
        <h4>Delete this review?</h4>
        <p class="text-muted">{{ review.text }}</p>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Delete</button>
            <a href="{% url 'product_detail' review.product.pk %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
