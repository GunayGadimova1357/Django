<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sports{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111315;
            --surface: #181b1f;
            --border: #2a2f36;
            --text: #f3f4f6;
            --muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        header {
            padding: 20px 0 0;
        }

        nav {
            width: min(960px, calc(100% - 32px));
            padding: 18px 0;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px 32px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            width: 100%;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
            border-color: var(--text);
        }

        main {
            width: min(960px, calc(100% - 32px));
            margin: 36px auto 48px;
        }

        .hero {
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            text-align: center;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 16px;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            font-size: clamp(34px, 5vw, 56px);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        p {
            line-height: 1.6;
            font-size: 18px;
            color: var(--muted);
        }

        .lead {
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            font-size: 19px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 28px;
        }

        .stat-card,
        .info-card {
            padding: 22px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            text-align: center;
        }

        .stat-card strong {
            display: block;
            margin-bottom: 8px;
            font-size: 28px;
            color: var(--text);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.4fr 0.9fr;
            gap: 22px;
            margin-top: 24px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 24px;
        }

        ul {
            margin: 0;
            padding-left: 0;
            list-style-position: inside;
            color: var(--muted);
        }

        li + li {
            margin-top: 10px;
        }

        @media (max-width: 820px) {
            .hero {
                padding: 28px 22px;
            }

            .stats,
            .content-grid {
                grid-template-columns: 1fr;
            }

            .brand,
            .nav-links {
                width: 100%;
            }

            .nav-links a {
                flex: 1 1 140px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="brand">Sports</div>
            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'football' %}">Football</a>
                <a href="{% url 'hockey' %}">Hockey</a>
                <a href="{% url 'basketball' %}">Basketball</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
