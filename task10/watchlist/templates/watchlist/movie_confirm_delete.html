{% extends 'watchlist/base.html' %}

{% block title %}Delete movie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="bg-white rounded shadow-sm p-4">
            <h1 class="h4 mb-3">Delete movie</h1>
            <p>Are you sure you want to delete "{{ movie.title }}"?</p>
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'movie_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
